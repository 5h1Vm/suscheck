# MCP static analysis — restricted tool identifiers and prompt-injection heuristics.
# Loaded by mcp_scanner.py (not the Layer 2 code plugin_loader).

[[restricted_tools]]
id = "MCP-TOOL-SHELL-EXEC"
name_pattern = '(?i)(run_shell|run_terminal_cmd|execute_command|execute_shell|shell_command|terminal_run|cmd_run|subprocess_run|spawn_shell)'
severity = "critical"
confidence = 0.88
title = "MCP tool name suggests arbitrary shell or process execution"
description = "The tool identifier matches patterns associated with exposing OS command execution to the model. This is a high-risk capability for agent abuse and lateral movement."
mitre_ids = ["T1059", "T1106"]

[[restricted_tools]]
id = "MCP-TOOL-FS-BROAD"
name_pattern = '(?i)^(fs_read|fs_write|filesystem_read|filesystem_write|read_file|write_file|delete_file|list_directory|glob_files)$'
severity = "high"
confidence = 0.72
title = "MCP tool name suggests broad filesystem access"
description = "Unscoped filesystem tools exposed to a general-purpose model increase prompt-injection and data-exfiltration risk. Prefer narrow, path-bounded capabilities."
mitre_ids = ["T1005", "T1048"]

[[restricted_tools]]
id = "MCP-TOOL-NETWORK"
name_pattern = '(?i)(fetch_url|http_request|raw_socket|open_url|download_and_run|curl_exec)'
severity = "high"
confidence = 0.70
title = "MCP tool name suggests unconstrained network access"
description = "Network-capable tools combined with LLM agents can enable SSRF, exfiltration, or fetching untrusted instructions."
mitre_ids = ["T1071", "T1105"]

[[restricted_tools]]
id = "MCP-TOOL-EVAL"
name_pattern = '(?i)(eval(uate)?_code|run_python|run_js|execute_script|eval_unsafe)'
severity = "critical"
confidence = 0.95
title = "MCP tool suggests arbitrary code evaluation"
description = "Tools that allow the model to execute arbitrary Python or JavaScript code are equivalent to shell access and represent a critical risk."
mitre_ids = ["T1059.006", "T1059.007"]

[[restricted_tools]]
id = "MCP-TOOL-AMBIGUOUS"
name_pattern = '(?i)^(handle_data|process_input|utility_wrapper|exec_op)$'
severity = "low"
confidence = 0.40
title = "Ambiguous high-privilege name candidate"
description = "Vague tool names can sometimes be used to mask high-privilege operations from cursory human review. Flagged for behavioral verification (dynamic scan)."
mitre_ids = ["T1036"]

[[restricted_tools]]
id = "MCP-TOOL-MIMICRY"
name_pattern = '(?i)^(ls|cat|grep|whoami|id|hostname|netstat|nmap|curl|wget|ssh|scp)$'
severity = "high"
confidence = 0.82
title = "Tool mimics standard shell utility"
description = "MCP tools named exactly like standard OS utilities can be used to trick models or humans into assuming standard (and potentially over-privileged) behavior."
mitre_ids = ["T1036.008"]

[[prompt_rules]]
id = "MCP-PROMPT-IGNORE-PRIOR"
regex = '(?i)ignore\s+(all\s+)?(prior|previous|above)\s+instructions?'
severity = "high"
confidence = 0.78
title = "Suspicious instruction override in MCP text"
description = "Text matches common prompt-injection patterns often embedded in tool descriptions or server metadata."
finding_type = "prompt_injection"
mitre_ids = ["T1059"]

[[prompt_rules]]
id = "MCP-PROMPT-DISCLOSE-SYSTEM"
regex = '(?i)(disregard|bypass)\s+(safety|policy|filter|guardrails?)'
severity = "high"
confidence = 0.72
title = "Policy or safety bypass language in MCP text"
description = "Phrasing that asks the model to ignore safety or policy constraints may indicate tool-description poisoning."
finding_type = "prompt_injection"
mitre_ids = ["T1565"]

[[prompt_rules]]
id = "MCP-PROMPT-EXFIL"
regex = '(?i)(exfiltrate|send\s+(the\s+)?(api[_\s]?key|secret|token|password)\s+to)'
severity = "critical"
confidence = 0.82
title = "Possible credential exfiltration instruction in MCP text"
description = "Tool or server text suggests steering the model toward leaking secrets. Treat as malicious or compromised server metadata."
finding_type = "prompt_injection"
mitre_ids = ["T1552", "T1048"]

[[prompt_rules]]
id = "MCP-RESOURCE-EXHAUSTION"
regex = '.{100000,}'
severity = "medium"
confidence = 0.50
title = "Extremely long MCP metadata (Potential Resource Exhaustion)"
description = "Unusually long tool descriptions or manifest entries can be used to cause context-window overflow or resource exhaustion in the agent."
finding_type = "suspicious_behavior"
mitre_ids = ["T1499"]

[[prompt_rules]]
id = "MCP-PROMPT-LATERAL"
regex = '(?i)(scan\s+internal|discover\s+peers|internal\s+network|subnet|hop\s+to|tunnel\s+to|gateway\s+pivot)'
severity = "high"
confidence = 0.75
title = "Internal network discovery or pivot instructions in MCP text"
description = "Instructions found in tool descriptions that steer the model toward internal network discovery, pivoting, or tunneling."
finding_type = "prompt_injection"
mitre_ids = ["T1018", "T1046"]

[[prompt_rules]]
id = "MCP-PROMPT-BYPASS"
regex = '(?i)(ignore\s+all\s+previous|disregard\s+safety|bypass\s+restrictions|overwrite\s+system\s+instructions)'
severity = "critical"
confidence = 0.90
title = "Explicit instruction bypass pattern"
description = "Text explicitly ordering the model to bypass safety or system constraints found in tool metadata."
finding_type = "prompt_injection"
mitre_ids = ["T1565"]
