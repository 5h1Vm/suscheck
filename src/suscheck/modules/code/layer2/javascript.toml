[[rules]]
id = "FUNC-JS-EVAL-ATOB"
name = "eval(atob()) — decode and execute"
regex = 'eval\s*\(\s*atob\s*\('
severity = "critical"
confidence = 0.90
finding_type = "encoded_payload"
description = "eval(atob()) decodes base64 and immediately executes it. Classic malware pattern."
mitre_ids = ["T1059.007", "T1140"]

[[rules]]
id = "FUNC-JS-FUNCTION"
name = "Function() constructor"
regex = '(?:new\s+)?Function\s*\('
severity = "high"
confidence = 0.65
finding_type = "suspicious_behavior"
description = "Function constructor creates functions from strings, equivalent to eval()."
mitre_ids = ["T1059.007"]

[[rules]]
id = "FUNC-JS-SETTIMEOUT-STR"
name = "setTimeout() with string"
regex = '''setTimeout\s*\(\s*["']'''
severity = "medium"
confidence = 0.60
finding_type = "suspicious_behavior"
description = "setTimeout() with a string argument acts as eval(). Can execute arbitrary code."
mitre_ids = ["T1059.007"]

[[rules]]
id = "WEB-JS-XSS"
name = "Potential DOM XSS"
regex = '''(?i)\.innerHTML\s*=\s*'''
severity = "medium"
confidence = 0.40
finding_type = "vulnerability"
description = "Direct innerHTML assignment found. May lead to Cross-Site Scripting (XSS) if input is unsanitized."
mitre_ids = ["T1189"]

[[rules]]
id = "WEB-JS-API-LEAK"
name = "Hardcoded API Proxy"
regex = '''(?i)apiKey\s*:\s*["'][A-Za-z0-0_-]{16,}["']'''
severity = "high"
confidence = 0.50
finding_type = "credential_leak"
description = "Potential API key hardcoded in client-side code. High risk of exploitation."
mitre_ids = ["T1552"]
