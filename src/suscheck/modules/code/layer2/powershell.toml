[[rules]]
id = "FUNC-PS-IEX"
name = "Invoke-Expression (IEX)"
regex = '(?i)(?:Invoke-Expression|IEX)\b'
severity = "high"
confidence = 0.80
finding_type = "suspicious_behavior"
description = "Invoke-Expression (IEX) executes arbitrary PowerShell. Core component of most PS exploits."
mitre_ids = ["T1059.001"]

[[rules]]
id = "FUNC-PS-WEBCLIENT"
name = "Net.WebClient download"
regex = '(?i)(?:Net\.WebClient|WebClient|Invoke-WebRequest|Invoke-RestMethod|wget\b|curl\b|iwr\b|irm\b)'
severity = "medium"
confidence = 0.55
finding_type = "suspicious_behavior"
description = "Web download in PowerShell. Check if it downloads and executes content."
mitre_ids = ["T1059.001", "T1105"]

[[rules]]
id = "FUNC-PS-ENCODED-CMD"
name = "PowerShell -EncodedCommand"
regex = '(?i)-(?:enc|encodedcommand)\b'
severity = "high"
confidence = 0.85
finding_type = "suspicious_behavior"
description = "PowerShell -EncodedCommand executes base64-encoded scripts. Heavily used by malware."
mitre_ids = ["T1059.001", "T1027"]

[[rules]]
id = "FUNC-PS-AMSI"
name = "AMSI bypass attempt"
regex = '(?i)(?:amsiInitFailed|AmsiUtils|amsi\.dll|AmsiScanBuffer)'
severity = "critical"
confidence = 0.90
finding_type = "evasion"
description = "AMSI (Antimalware Scan Interface) bypass attempt detected. Strong malware indicator."
mitre_ids = ["T1562.001"]

[[rules]]
id = "FUNC-PS-EXECUTION-POLICY"
name = "Execution policy bypass"
regex = '(?i)-ExecutionPolicy\s+(?:Bypass|Unrestricted)'
severity = "medium"
confidence = 0.65
finding_type = "suspicious_behavior"
description = "PowerShell execution policy bypass. Common in malware droppers."
mitre_ids = ["T1059.001"]
